# === Минимальные требования ===
min_answer_length: 50

# === Обязательные поля ===
required_fields:
  - winner_found
  - winners
  - procurement_info.status
  - document_info.type
  - reasoning

# === Паттерны отсутствия победителя ===
no_winner_patterns:
  - "не подано ни одной заявки"
  - "заявки не поступили"
  - "закупка отменена"
  - "отсутствуют участники"
  - "закупка не состоялась.*не подано"
  - "ни одной заявки не поступило"
  - "заявок не поступило"

# === Паттерны НАЛИЧИЯ победителя при несостоявшейся закупке ===
winner_despite_not_held_patterns:
  - "подана только одна заявка"
  - "единственный участник"
  - "допущен и признан участником закупки единственный участник"
  - "остальные участники отклонены"
  - "поступила одна заявка"
  - "единственная заявка"
  - "один участник допущен"

# === Маркеры победителя (ИЗВЛЕКАТЬ) ===
winner_markers:
  - "Победитель"
  - "первый порядковый номер"
  - "присвоен первый порядковый номер"
  - "Результат: Победитель"
  - "признан победителем"
  - "победитель закупки"
  - "поставщик определен"
  - "заключить договор с"
  - "заключить контракт с"
  - "Итоговый рейтинг.*1"

# === Маркеры заказчика (НЕ извлекать ИНН!) ===
customer_markers:
  - "Сведения об организаторе"
  - "Сведения о заказчике"
  - "Организатор закупки"
  - "Организатором процедуры является"
  - "Контактная информация заказчика"
  - "Наименование заказчика"
  - "Заказчик:"
  - "Информация о заказчике"

# === Типы бюджетных учреждений (обычно ЗАКАЗЧИКИ, не победители) ===
budget_institution_patterns:
  - "^МАДОУ"
  - "^МАОУ"
  - "^МБОУ"
  - "^МКОУ"
  - "^МБУ"
  - "^МКУ"
  - "^ГАУ"
  - "^ГБУ"
  - "^ГБОУ"
  - "^ОГБОУ"
  - "^ОГБПОУ"
  - "^КГБУ"
  - "^Администрация"
  - "^Управление"
  - "^Департамент"
  - "^Министерство"

# === Типы коммерческих организаций (обычно ПОБЕДИТЕЛИ) ===
commercial_org_patterns:
  - "^ООО"
  - "^ИП\\s"
  - "^АО\\s"
  - "^ЗАО"
  - "^ПАО"
  - "^Индивидуальный предприниматель"

# === Маркеры оператора ЭТП (НЕ извлекать) ===
operator_markers:
  - "Сведения об операторе электронной площадки"
  - "Техническая поддержка"
  - "ТОРГИ-ОНЛАЙН"
  - "Сбербанк-АСТ"
  - "РТС-тендер"
  - "ЕЭТП"
  - "Единая электронная торговая площадка"
  - "Росэлторг"
  - "ЭТП ГПБ"

# === Маркеры служебных файлов ===
service_file_patterns:
  - "Техническое задание"
  - "Проект контракта"
  - "Расчёт баллов"
  - "Расчет баллов"
  - "Извещение о закупке"
  - "Форма заявки"
  - "Документация о закупке"
  - "Обоснование начальной.*цены"
  - "Проект договора"
  - "Спецификация"

# === Маркеры анонимизированных данных ===
anonymized_patterns:
  - "Заявка №\\d+, -"
  - "Заявка №\\d+$"
  - "участник №\\d+"
  - "Заявка \\d+"
  - "^-$"
  - "^№\\d+$"
  - "Участник \\d+"

# === Проверки качества ===
quality_checks:
  winner_not_customer: true          # Победитель ≠ Заказчик
  winner_required_if_found: true     # Если found=true, должен быть winner
  inn_format: "^\\d{10}$|^\\d{12}$"  # ИНН: 10 или 12 цифр
  kpp_format: "^\\d{9}$"             # КПП: 9 цифр
  ogrn_format: "^\\d{13}$|^\\d{15}$" # ОГРН: 13 или 15 цифр
  budget_institution_not_winner: true # Бюджетные учреждения не должны быть победителями

# === Лимиты ===
limits:
  max_reasoning_length: 1000
  max_source_quote_length: 200
  max_winners_per_document: 50

# === Маркеры галлюцинаций (снижают confidence) ===
hallucination_markers:
  - "по моему мнению"
  - "вероятно"
  - "скорее всего"
  - "предположительно"
  - "возможно"
  - "не уверен"
  - "кажется"

# === Маркеры многолотовой закупки ===
multi_lot_markers:
  - "Лот №"
  - "Лот \\d+"
  - "по лоту"
  - "Номер лота"
  - "лоты закупки"
  - "номер участника"
  

# === Динамический расчёт confidence ===
confidence_adjustments:
  has_inn: +0.1
  has_kpp: +0.05
  has_ogrn: +0.05
  has_address: +0.05
  has_price: +0.1
  data_anonymized: -0.3
  hallucination_detected: -0.2
  budget_institution_as_winner: -0.3
  missing_source_quote: -0.1
